# ============================================================================
# eBay Browse Search API Configuration
# ============================================================================
# Purpose:
#   Defines how the ingestion framework communicates with the eBay Browse API.
#   Contains API behavior only.
# ============================================================================

# ----------------------------------------------------------------------------
# Browse Search API Configuration
# ----------------------------------------------------------------------------

api:
  
  # Base endpoint information
  base_url: "https://api.ebay.com"
  endpoint: "/buy/browse/v1/item_summary/search"
  method: "GET"
  # eBay marketplace to query
  marketplace_id: "EBAY_US"
  default_limit: 200
  paginator: multi_page
  data_selector: itemSummaries
  
  # --------------------------------------------------------------------------
  # Incremental Discovery Configuration
  # --------------------------------------------------------------------------
  # dlt automatically replaces {incremental.start_value}
  # with the latest processed itemStartDate.
  incremental:
    
    cursor_path : itemStartDate
    initial_value: "2026-01-01T00:00:00Z"
  

  # --------------------------------------------------------------------------
  # Browse Search Filters
  # --------------------------------------------------------------------------
  filter:
    
    item_start_date: "itemStartDate:[{incremental.start_value}..]"

  # --------------------------------------------------------------------------
  # Internal → eBay Query Parameter Mapping
  # --------------------------------------------------------------------------
  parameters:
    
    search: "q"
    limit: "limit"
    offset: "offset"
    filter: "filter"

# ----------------------------------------------------------------------------
# OAuth Authentication Configuration
# ----------------------------------------------------------------------------
authentication:
  
  type: ebay_oauth
  access_token_url: "https://api.ebay.com/identity/v1/oauth2/token"
  grant_type: client_credentials
  scope: https://api.ebay.com/oauth/api_scope
  token_expiration: 7200


# ----------------------------------------------------------------------------
# dlt Pipeline Configuration
# ----------------------------------------------------------------------------
pipeline:
  
  pipeline_name: "ebay_browse_ingestion"
  dataset_name: "ebay"

