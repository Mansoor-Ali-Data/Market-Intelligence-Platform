# API connection and data endpoint configuration 
api:
  base_url: "https://api.ebay.com"
  endpoint: "/buy/browse/v1/item_summary/search"
  method: "GET"
  marketplace: "EBAY_US"
  page_size: 200
  default_limit: 200
  paginator: multi_page
  data_selector: itemSummaries

  # Mapping of internal keys to eBay API query parameters
  parameters:
    search: "q"
    page_size: "limit"
    offset: "offset"
    filter: "filter"

# Authentication mechanism for secure API access
authentication:
  type: ebay_oauth
  access_token_url: "https://api.ebay.com/identity/v1/oauth2/token"
  grant_type: client_credentials
  scope: https://api.ebay.com/oauth/api_scope
  token_expiration: 7200
  marketplace_id: EBAY_US

# Historical backfill and initial data loading setup
bootstrap:
  enabled: true
  start_date: "2026-01-01"
  end_date: null

# Data ingestion pipeline configuration
pipeline:
  pipeline_name: "ebay_browse_ingestion"
  dataset_name: "ebay"

